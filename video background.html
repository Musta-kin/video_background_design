<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LUMIÈRE · premium tech</title>
    <!-- Google Fonts: Poppins + Inter for luxury typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 (free) for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Poppins', sans-serif;
            background: #0b0a0c;
            overflow-x: hidden;
            color: #fff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ---------- HERO (fullscreen video) ---------- */
        .hero {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0a0809;
        }

        /* Video background – edge to edge, perfect fit */
        .back-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.65) saturate(1.1) contrast(1.05);
            transform: scale(1.01);
            will-change: transform;
        }

        /* Cinematic dark overlay + gold gradient wash */
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 40%, rgba(30, 25, 20, 0.25) 0%, rgba(0, 0, 0, 0.8) 95%);
            z-index: 1;
            pointer-events: none;
        }

        /* Floating gold reflection / light drift */
        .hero__glow {
            position: absolute;
            top: -10%;
            left: -5%;
            width: 70%;
            height: 130%;
            background: radial-gradient(ellipse at 30% 40%, rgba(212, 175, 55, 0.07) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
            animation: driftGlow 22s ease-in-out infinite alternate;
        }

        @keyframes driftGlow {
            0% { transform: translate(-2%, -5%) scale(1); opacity: 0.4; }
            100% { transform: translate(10%, 10%) scale(1.4); opacity: 0.9; }
        }

        /* ---------- FLOATING NAV (glassmorphism) ---------- */
        .navbar {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 1320px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            background: rgba(20, 18, 22, 0.2);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 100px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.06) inset;
            transition: box-shadow 0.4s ease, background 0.3s, border-color 0.3s;
        }

        .navbar:hover {
            background: rgba(20, 18, 22, 0.4);
            box-shadow: 0 20px 64px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(212, 175, 55, 0.2) inset;
            border-color: rgba(212, 175, 55, 0.35);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #f5efe6;
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: -0.02em;
        }

        .logo i {
            font-size: 2rem;
            color: #d4af37;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.25));
        }

        .logo span {
            background: linear-gradient(135deg, #f5e6c8 0%, #d4af37 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.8rem;
            list-style: none;
        }

        .nav-links li a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: color 0.3s ease, transform 0.2s;
            position: relative;
            padding: 4px 0;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: linear-gradient(90deg, #d4af37, #f5e6c8);
            transition: width 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .nav-links li a:hover {
            color: #fff;
            transform: translateY(-1px);
        }

        .nav-links li a:hover::after {
            width: 100%;
        }

        /* ---------- HERO CONTENT (centered on video) ---------- */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 0 24px;
            animation: fadeUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .hero-content h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: clamp(3.8rem, 14vw, 8rem);
            line-height: 1.02;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, #e8dcc8 50%, #d4af37 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(212, 175, 55, 0.15);
            margin-bottom: 0.3rem;
        }

        .hero-content .subhead {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: clamp(1.1rem, 2.4vw, 1.7rem);
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 2.4rem;
            backdrop-filter: blur(2px);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
        }

        .hero-content .subhead i {
            color: #d4af37;
            margin: 0 10px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Premium CTA buttons – glassmorphism + gold glow */
        .cta-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 48px;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.03em;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid transparent;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: #fff;
            border-color: rgba(212, 175, 55, 0.2);
            min-width: 180px;
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
            border-color: rgba(212, 175, 55, 0.4);
            color: #f5efe6;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.08), inset 0 0 20px rgba(212, 175, 55, 0.02);
        }

        .btn-primary i {
            color: #d4af37;
            transition: transform 0.3s;
        }

        .btn-primary:hover {
            background: rgba(212, 175, 55, 0.25);
            border-color: #d4af37;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2), 0 12px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(-3px) scale(1.02);
            color: #fff;
        }

        .btn-primary:hover i {
            transform: translateX(4px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        /* ---------- FLOATING PARTICLES (subtle) ---------- */
        .particles {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            filter: blur(1px);
            animation: floatParticle 18s infinite alternate ease-in-out;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.1);
        }

        .particle:nth-child(1) { top: 15%; left: 10%; animation-duration: 22s; width: 6px; height: 6px; }
        .particle:nth-child(2) { top: 70%; left: 80%; animation-duration: 26s; width: 8px; height: 8px; opacity: 0.5; }
        .particle:nth-child(3) { top: 40%; left: 85%; animation-duration: 20s; width: 4px; height: 4px; }
        .particle:nth-child(4) { top: 80%; left: 20%; animation-duration: 28s; width: 10px; height: 10px; opacity: 0.3; }
        .particle:nth-child(5) { top: 25%; left: 70%; animation-duration: 24s; width: 5px; height: 5px; }
        .particle:nth-child(6) { top: 60%; left: 40%; animation-duration: 30s; width: 7px; height: 7px; opacity: 0.4; }

        @keyframes floatParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(60px, -80px) scale(1.8); opacity: 0.8; }
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            .navbar {
                width: 92%;
                padding: 12px 20px;
                top: 16px;
                border-radius: 60px;
                flex-wrap: nowrap;
            }

            .nav-links {
                gap: 1.4rem;
            }

            .nav-links li a {
                font-size: 0.8rem;
            }

            .logo {
                font-size: 1.1rem;
            }
            .logo i {
                font-size: 1.5rem;
            }

            .hero-content h1 {
                font-size: clamp(2.6rem, 12vw, 4.5rem);
            }

            .hero-content .subhead {
                font-size: clamp(0.8rem, 2vw, 1.1rem);
                letter-spacing: 0.08em;
            }

            .btn {
                padding: 14px 32px;
                font-size: 0.9rem;
                min-width: 150px;
            }

            .cta-group {
                gap: 14px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                width: 96%;
                padding: 10px 16px;
                top: 12px;
            }

            .nav-links {
                gap: 0.8rem;
            }
            .nav-links li a {
                font-size: 0.7rem;
            }

            .btn {
                padding: 12px 24px;
                font-size: 0.8rem;
                min-width: 120px;
            }

            .hero-content h1 {
                font-size: clamp(2.2rem, 14vw, 3.4rem);
            }
        }

        /* small extra touch: gold cursor glow (optional) */
        .hero-content .gold-accent {
            display: inline-block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 16px auto 10px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- ========== HERO ========== -->
    <section class="hero" id="home">
        <!-- VIDEO BACKGROUND – already exists in project (referenced) -->
        <video autoplay loop muted playsinline class="back-video" id="heroVideo">
            <source src="ScreenCapture_2023-4-6 21.57.57.mp4" type="video/mp4">
            <!-- fallback text -->
            Your browser does not support the video tag.
        </video>

        <!-- gold light drift -->
        <div class="hero__glow"></div>

        <!-- subtle particles -->
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <!-- ===== FLOATING NAV ===== -->
        <nav class="navbar" role="navigation">
            <a href="#" class="logo" aria-label="Lumière">
                <i class="fas fa-crown"></i>
                <span>Lumière</span>
            </a>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <!-- ===== HERO CONTENT ===== -->
        <div class="hero-content">
            <h1>Elevate&nbsp;Beyond</h1>
            <div class="subhead">
                <i class="fas fa-minus"></i>  visionary technology  <i class="fas fa-minus"></i>
            </div>
            <div class="gold-accent"></div>
            <div class="cta-group">
                <a href="#" class="btn btn-primary">
                    <span>Discover</span> <i class="fas fa-arrow-right"></i>
                </a>
                <a href="#" class="btn btn-secondary">
                    <i class="fas fa-play-circle"></i> Showcase
                </a>
            </div>
        </div>
    </section>

    <!-- small script to ensure video plays and loop (robust) -->
    <script>
        (function() {
            const video = document.getElementById('heroVideo');
            if (video) {
                // ensure autoplay, loop, mute
                video.muted = true;
                video.loop = true;
                video.setAttribute('playsinline', '');
                // if browser blocks autoplay, try to play on user interaction
                const playVideo = () => {
                    if (video.paused) {
                        video.play().catch(() => {});
                    }
                };
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => {});
                });
                // fallback: click anywhere on hero to start video if needed
                document.querySelector('.hero')?.addEventListener('click', playVideo, { once: true });
                // also on touch
                document.addEventListener('touchstart', playVideo, { once: true });
            }
        })();
    </script>
</body>
</html>
